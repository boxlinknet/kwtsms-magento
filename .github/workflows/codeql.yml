name: CodeQL Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: actions
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:actions"

  php-security:
    name: PHP Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Check for dangerous functions
        run: |
          echo "Scanning for dangerous PHP functions..."
          FOUND=0
          for pattern in 'eval(' 'exec(' 'system(' 'passthru(' 'shell_exec(' 'proc_open(' 'popen('; do
            if grep -rn "$pattern" src/ --include="*.php" | grep -v "Test/" | grep -v "vendor/"; then
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Dangerous PHP functions found"
            exit 1
          fi
          echo "No dangerous functions found"

      - name: Check for superglobals
        run: |
          echo "Scanning for direct superglobal access..."
          if grep -rn '\$_GET\|\$_POST\|\$_REQUEST\|\$_SERVER\|\$_SESSION\|\$_COOKIE' src/ --include="*.php" | grep -v "Test/"; then
            echo "::error::Direct superglobal access found"
            exit 1
          fi
          echo "No superglobals found"

      - name: Check for ObjectManager usage
        run: |
          echo "Scanning for direct ObjectManager usage..."
          if grep -rn 'ObjectManager::getInstance\|new ObjectManager' src/ --include="*.php"; then
            echo "::error::Direct ObjectManager usage found"
            exit 1
          fi
          echo "No ObjectManager misuse found"
