services:
  php:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: kwtsms-magento-php
    volumes:
      - magento_data:/var/www/html
      - ./src:/var/www/html/app/code/KwtSms
    depends_on:
      db:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - PHP_MEMORY_LIMIT=2G
    networks:
      - kwtsms-magento

  nginx:
    image: nginx:1.24-alpine
    container_name: kwtsms-magento-nginx
    ports:
      - "8085:80"
    volumes:
      - magento_data:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - kwtsms-magento

  db:
    image: mysql:8.0
    container_name: kwtsms-magento-db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: magento_root
      MYSQL_DATABASE: magento
      MYSQL_USER: magento
      MYSQL_PASSWORD: magento
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pmagento_root"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - kwtsms-magento

  opensearch:
    image: opensearchproject/opensearch:2.12.0
    container_name: kwtsms-magento-opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=KwtSms_Dev_2026!
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 | grep -q 'opensearch'"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - kwtsms-magento

  redis:
    image: redis:7.2-alpine
    container_name: kwtsms-magento-redis
    networks:
      - kwtsms-magento

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: kwtsms-magento-pma
    ports:
      - "8083:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: magento_root
    depends_on:
      - db
    networks:
      - kwtsms-magento

volumes:
  magento_data:
  db_data:
  opensearch_data:

networks:
  kwtsms-magento:
    driver: bridge
